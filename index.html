<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IncrediPets HRMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#FF007F;--amaranth:#B00050;--logo:#8A003E;--aqua:#A4F4C6;--pale:#EBD4F5;--green:#2E9D52;
    --ink:#1F1F1F;--muted:#5A5A5A;--rule:#E7E5EA;--bg:#F4F4F7;--soft:#FAF8FC;--surface:#fff;
    --amber:#a8761a;--amber-bg:#fff8e6;--amber-rule:#f3d98a;
    --radius:14px;--shadow:0 1px 3px rgba(20,10,30,.06);--shadow-lg:0 12px 34px rgba(80,10,50,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .num{font-variant-numeric:tabular-nums}
  svg{width:20px;height:20px;stroke-width:1.9;flex:none}
  button{font:inherit;cursor:pointer}
  .hidden{display:none!important}
  a{color:var(--amaranth)}

  /* ---- prototype banner ---- */
  .proto{background:var(--amber-bg);border-bottom:1px solid var(--amber-rule);color:var(--amber);font-size:12px;font-weight:700;
         text-align:center;padding:6px 12px;letter-spacing:.3px}

  /* ---- login ---- */
  .login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;
         background:radial-gradient(1100px 560px at 50% -10%,#fff,var(--bg))}
  .login-card{background:#fff;border:1px solid var(--rule);border-radius:20px;box-shadow:var(--shadow-lg);
              padding:34px 34px;width:min(430px,94vw)}
  .lg-brand{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:4px}
  .lg-brand .mark{width:40px;height:40px;border-radius:11px;background:var(--logo);color:#fff;
              display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
  .lg-brand .wm{font-weight:800;font-size:21px;letter-spacing:-.4px}
  .lg-brand .wm b{color:var(--logo)}
  .login .sub{text-align:center;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:22px}
  .login h2{font-size:15px;margin:0 0 4px}
  .login .err{background:#fdecef;border:1px solid #f5c2d1;color:#a81243;font-size:12.5px;font-weight:600;border-radius:9px;padding:9px 12px;margin-bottom:12px}
  .demo-box{margin-top:20px;border-top:1px dashed var(--rule);padding-top:16px}
  .demo-box .lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#a59fae;margin-bottom:9px}
  .demo-grid{display:flex;flex-direction:column;gap:7px}
  .demo-btn{display:flex;align-items:center;gap:11px;text-align:left;background:#fff;border:1.5px solid var(--rule);
            border-radius:11px;padding:10px 13px;transition:all .15s;width:100%}
  .demo-btn:hover{border-color:var(--rose);background:#fff5fa}
  .demo-btn .ic{width:34px;height:34px;border-radius:9px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center}
  .demo-btn .t{font-weight:700;font-size:13.5px}
  .demo-btn .d{font-size:11.5px;color:var(--muted)}
  .login .foot{margin-top:18px;font-size:11px;color:#b9b3c0;text-align:center}
  .login .foot a{cursor:pointer;text-decoration:underline}
  .emailbox{margin-top:16px;border-top:1px dashed var(--rule);padding-top:14px;text-align:center}
  .emailbox .toggle{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--muted)}
  .emailbox .toggle:hover{color:var(--amaranth)}

  /* ---- app shell ---- */
  .app{display:grid;grid-template-columns:242px 1fr;min-height:100dvh}
  .side{background:var(--surface);border-right:1px solid var(--rule);padding:18px 14px;display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100dvh}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 14px}
  .brand .mark{width:32px;height:32px;border-radius:9px;background:var(--logo);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .brand .wm{font-weight:800;font-size:16px} .brand .wm b{color:var(--logo)}
  .nav-label{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#a59fae;padding:12px 10px 5px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--muted);font-weight:600;font-size:13.5px;border:none;background:none;width:100%;text-align:left;transition:all .15s}
  .nav-item svg{width:18px;height:18px}
  .nav-item:hover{background:var(--soft);color:var(--ink)}
  .nav-item.active{background:var(--pale);color:var(--amaranth)}
  .nav-item .badge{margin-left:auto;font-size:10.5px;font-weight:800;background:var(--rose);color:#fff;border-radius:20px;padding:1px 7px}
  .side-foot{margin-top:auto;border-top:1px solid var(--rule);padding-top:10px}
  .me{display:flex;align-items:center;gap:10px;padding:6px 8px 12px}
  .me .nm{font-weight:700;font-size:13px;line-height:1.2}
  .me .rl{font-size:11px;color:var(--muted)}
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:14px;padding:0 26px;position:sticky;top:0;z-index:10}
  .topbar .ttl{font-weight:700;font-size:16px}
  .topbar .role-tag{font-size:11px;font-weight:700;background:var(--pale);color:var(--amaranth);padding:4px 10px;border-radius:20px}
  .spacer{flex:1}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--amaranth));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:none}
  .avatar.sm{width:30px;height:30px;font-size:12px}
  .avatar.lg{width:56px;height:56px;font-size:20px}
  .content{padding:26px;max-width:1040px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px}

  h1.page{font-size:23px;letter-spacing:-.5px}
  .page-sub{color:var(--muted);font-size:14px;margin-top:2px}
  .card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-pad{padding:22px 24px}
  .sec-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sec-h .si{width:32px;height:32px;border-radius:9px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center}
  .sec-h h2{font-size:16px}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .muted{color:var(--muted)}
  .small{font-size:12px}

  /* stat tiles */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .stat{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600}
  .stat .v{font-weight:800;font-size:22px;margin-top:4px;letter-spacing:-.5px}
  .stat .v small{font-size:13px;font-weight:700;color:var(--muted)}
  .stat .sub{font-size:11.5px;color:var(--muted);margin-top:2px}

  /* forms */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.full{grid-column:1/-1}
  .field label{font-size:12.5px;font-weight:700;color:var(--muted)}
  .field input,.field select,.field textarea{font:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--rule);border-radius:10px;background:#fff;outline:none;transition:border .15s;width:100%}
  .field textarea{resize:vertical;min-height:90px}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--rose)}
  .lock-row{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-rule);border-radius:8px;padding:7px 11px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;border-radius:10px;padding:11px 18px;border:1px solid transparent;transition:all .16s}
  .btn svg{width:17px;height:17px}
  .btn-primary{background:var(--rose);color:#fff} .btn-primary:hover{background:var(--amaranth)}
  .btn-ghost{background:#fff;border-color:var(--rule);color:var(--ink)} .btn-ghost:hover{background:var(--soft)}
  .btn-green{background:var(--green);color:#fff} .btn-green:hover{filter:brightness(.93)}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
  .btn-block{width:100%}

  /* breakup live panel */
  .breakup{background:var(--soft);border:1px solid var(--rule);border-radius:12px;padding:16px 18px}
  .breakup h4{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .bl{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px}
  .bl span:first-child{color:var(--muted)} .bl span:last-child{font-weight:700}
  .bl.tot{border-top:1px dashed var(--rule);margin-top:6px;padding-top:9px}
  .bl.tot span{color:var(--amaranth);font-weight:800;font-size:15px}

  /* offer letter */
  .letter{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:30px 34px;box-shadow:var(--shadow);position:relative;max-width:720px;margin:0 auto}
  .letter .lh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--amaranth);padding-bottom:14px;margin-bottom:18px}
  .letter .lh .wm{font-weight:800;font-size:20px} .letter .lh .wm b{color:var(--logo)}
  .letter .lh .co{font-size:11px;color:var(--muted);margin-top:2px}
  .letter h3{color:var(--amaranth);font-size:16px;text-align:center;letter-spacing:.5px;margin:6px 0 16px}
  .letter p{font-size:13.5px;margin:9px 0;color:#333}
  .letter table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
  .letter th,.letter td{border:1px solid var(--rule);padding:8px 11px;text-align:left}
  .letter th{background:var(--soft);font-weight:700}
  .letter td:last-child,.letter th:last-child{text-align:right}
  .letter .sign{margin-top:26px;display:flex;justify-content:space-between;font-size:13px}
  .stamp{position:absolute;top:18px;right:26px;font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 9px;border-radius:6px}
  .stamp.draft{color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-rule)}
  .stamp.approved{color:#0c5a2e;background:var(--aqua);border:1px solid #7fe0a6}

  /* table list */
  table.list{width:100%;border-collapse:collapse;font-size:13.5px}
  table.list th{text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--rule)}
  table.list td{padding:12px 14px;border-bottom:1px solid var(--rule);vertical-align:middle}
  table.list tr:last-child td{border-bottom:none}
  table.list tr.click{cursor:pointer} table.list tr.click:hover td{background:var(--soft)}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;white-space:nowrap}
  .pill.offered,.pill.pending_approval,.pill.offer{background:var(--pale);color:var(--amaranth)}
  .pill.active,.pill.approved,.pill.verified{background:var(--aqua);color:#0c5a2e}
  .pill.accepted,.pill.released{background:#dff0ff;color:#0369a1}
  .pill.onboarding{background:#fef3d6;color:#a8761a}
  .pill.uploaded{background:#dff0ff;color:#0369a1}
  .pill.requested,.pill.pending{background:#f0eef3;color:#6b6577}
  .pill.declined,.pill.rejected,.pill.exited{background:#fdecef;color:#a81243}

  .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border-radius:12px;overflow:hidden}
  .info-cell{background:#fff;padding:14px 16px}
  .info-cell .k{font-size:12px;color:var(--muted);font-weight:600}
  .info-cell .v{font-weight:700;font-size:14.5px;margin-top:5px}

  /* progress bar */
  .bar{height:9px;background:#ece9f1;border-radius:20px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--rose),var(--amaranth));border-radius:20px}
  .bar.green > i{background:linear-gradient(90deg,#54c97e,var(--green))}

  /* doc rows */
  .doc{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--rule)}
  .doc:last-child{border-bottom:none}
  .doc .di{width:40px;height:40px;border-radius:10px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center;flex:none}
  .doc .dt{flex:1;min-width:0}
  .doc .dt b{font-size:14px}
  .doc .dt .dm{font-size:12px;color:var(--muted)}

  /* timeline / tenure */
  .tl{position:relative;padding-left:26px}
  .tl::before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--rule)}
  .tl .ti{position:relative;padding:0 0 16px}
  .tl .ti:last-child{padding-bottom:0}
  .tl .ti::before{content:'';position:absolute;left:-23px;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2.5px solid var(--rose)}
  .tl .ti.done::before{background:var(--rose)}
  .tl .ti b{font-size:13.5px} .tl .ti .tm{font-size:12px;color:var(--muted)}

  /* ladder */
  .ladder{display:flex;flex-direction:column;gap:10px}
  .rung{display:flex;align-items:flex-start;gap:14px;border:1.5px solid var(--rule);border-radius:12px;padding:14px 16px;background:#fff}
  .rung.cur{border-color:var(--amaranth);background:#fff5fa}
  .rung.next{border-color:#7fe0a6;background:#f1fcf5}
  .rung .lv{width:42px;height:42px;border-radius:11px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex:none}
  .rung.next .lv{background:var(--aqua);color:#0c5a2e}
  .rung .lt{flex:1;min-width:0}
  .rung .lt b{font-size:14.5px}
  .rung .lt .ld{font-size:12.5px;color:var(--muted);margin-top:1px}
  .req{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-top:6px}
  .req .ck{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:11px;font-weight:800}
  .req .ck.ok{background:var(--aqua);color:#0c5a2e} .req .ck.no{background:#f0eef3;color:#9b95a6}

  /* tabs */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--rule);margin-bottom:18px}
  .tab{padding:9px 14px;font-weight:700;font-size:13.5px;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--amaranth);border-bottom-color:var(--amaranth)}

  .empty{color:#b9b3c0;font-size:13px;text-align:center;padding:26px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;gap:10px;align-items:center;z-index:100;max-width:90vw}

  @media (max-width:820px){.app{grid-template-columns:1fr}.side{display:none}.grid2,.grid3{grid-template-columns:1fr}.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-card">
    <div class="lg-brand"><div class="mark">IP</div><div class="wm"><b>Incredi</b>Pets</div></div>
    <div class="sub">HRMS · Employee Lifecycle</div>
    <div class="demo-box" style="border-top:none;padding-top:0">
      <div class="lbl">Open a portal — tap to enter</div>
      <div class="demo-grid" id="demoGrid"></div>
    </div>
    <div class="emailbox">
      <a class="toggle" id="emailToggle" onclick="toggleEmail()">Sign in with work email instead</a>
      <div id="emailFields" class="hidden" style="margin-top:14px;text-align:left">
        <div id="loginErr" class="err hidden"></div>
        <div class="field" style="margin-bottom:12px"><label>Work email</label><input id="li_email" type="email" placeholder="you@incredipets.in" autocomplete="username"></div>
        <div class="field" style="margin-bottom:16px"><label>Password</label><input id="li_pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn btn-primary btn-block" onclick="doLogin()">Sign in</button>
      </div>
    </div>
    <div class="foot">Prototype · data is saved in this browser only · no real employee data.<br>Real email/password login comes later · <a onclick="resetDemo()">Reset demo data</a></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <aside class="side">
    <div class="brand"><div class="mark">IP</div><div class="wm"><b>Incredi</b>Pets</div></div>
    <div id="nav"></div>
    <div class="side-foot">
      <div class="me"><div class="avatar sm" id="meAv">?</div><div><div class="nm" id="meName">—</div><div class="rl" id="meRole">—</div></div></div>
      <button class="nav-item" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>Switch portal</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <span class="ttl" id="topTitle">—</span><span class="role-tag" id="roleTag"></span>
      <span class="spacer"></span>
      <div class="avatar" id="topAvatar">?</div>
    </div>
    <div class="content" id="view"></div>
  </div>
</div>

<script>
/* ============================================================
   IncrediPets HRMS — working prototype
   Front-end only. Data persists in localStorage (this browser).
   Maps onto Supabase tables later: employees, profiles, offers,
   positions, documents, payslips, leave, kpis, levels.
   ============================================================ */

const KEY='incredipets_hrms_v2';
const fmt=n=>'₹ '+Number(Math.round(n)).toLocaleString('en-IN');
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=n=>(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

/* ---------- seed ---------- */
function seed(){
  const levels=[
    {level:'L1',title:'Associate',         minMonths:0, designations:['Trainee','Associate']},
    {level:'L2',title:'Executive',         minMonths:12,designations:['Executive','Field Sales Executive','CRM Associate']},
    {level:'L3',title:'Senior Executive',  minMonths:12,designations:['Senior Executive','Senior Field Sales Executive']},
    {level:'L4',title:'Team Lead',         minMonths:18,designations:['Team Lead']},
    {level:'L5',title:'Manager',           minMonths:18,designations:['Manager']},
    {level:'L6',title:'Senior Manager',    minMonths:24,designations:['Senior Manager','Head']}
  ];
  const positions=[
    {id:'P1',title:'Field Sales Executive',dept:'Supply',level:'L2',location:'Gurugram, Delhi NCR',openings:3,hiringManager:'Ankit',bandMin:300000,bandMax:420000,status:'Open',
     jd:'Drive on-ground supply partner acquisition across the NCR cluster. Own daily field visits, onboarding of new pet-supply partners, and CRM hygiene. Target-led role with monthly acquisition and retention KPIs.'},
    {id:'P2',title:'CRM Associate',dept:'Customer Care',level:'L2',location:'Gurugram, Delhi NCR',openings:2,hiringManager:'Rashid',bandMin:280000,bandMax:360000,status:'Open',
     jd:'Handle inbound customer queries across chat and voice, maintain CRM records, and escalate within SLA. First point of contact for IncrediPets customers.'}
  ];
  const employees=[
    {id:'E1',code:'IN-001',name:'Jiten Kakar',desig:'Founder & CEO',dept:"Founder's Office",level:'L6',location:'Gurugram, Delhi NCR',doj:'2021-04-01',managerId:null,phone:'+91 90000 00001',email:'jiten@incredipets.in',status:'active',onboarded:true},
    {id:'E2',code:'IN-014',name:'Priya Perral',desig:'General Manager — HR',dept:'People & Ops',level:'L5',location:'Gurugram, Delhi NCR',doj:'2023-02-15',managerId:'E1',phone:'+91 90000 00014',email:'priya@incredipets.in',status:'active',onboarded:true},
    {id:'E3',code:'IN-318',name:'Rohit Verma',desig:'Field Sales Executive',dept:'Supply',level:'L2',location:'Gurugram, Delhi NCR',doj:'2025-09-15',managerId:'E1',phone:'+91 98111 23318',email:'rohit@incredipets.in',status:'active',onboarded:true,positionId:'P1'},
    {id:'E4',code:'IN-319',name:'Sneha Iyer',desig:'CRM Associate',dept:'Customer Care',level:'L2',location:'Gurugram, Delhi NCR',doj:'2026-06-09',managerId:'E1',phone:'+91 98111 23319',email:'sneha@incredipets.in',status:'onboarding',onboarded:false,positionId:'P2'}
  ];

const empById=id=>DB.employees.find(e=>e.id===id);
const offerForEmp=id=>DB.offers.find(o=>o.employeeId===id);
const docsForEmp=id=>DB.documents.filter(d=>d.employeeId===id);
const calc=ctc=>{const m=ctc/12;return{m,basic:m*.62,hra:m*.31,spl:m*.07};};
function tenure(doj){
  const a=new Date(doj),b=new Date();
  if(a>b)return{y:0,mo:0,d:0,totalDays:0,totalMonths:0,future:true}; // not joined yet
  let y=b.getFullYear()-a.getFullYear(),mo=b.getMonth()-a.getMonth(),d=b.getDate()-a.getDate();
  if(d<0){mo--;const pm=new Date(b.getFullYear(),b.getMonth(),0).getDate();d+=pm;}
  if(mo<0){y--;mo+=12;}
  const totalDays=Math.floor((b-a)/86400000);
  const totalMonths=y*12+mo;
  return{y,mo,d,totalDays,totalMonths};
}
function dfmt(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}

    // create login + document checklist for the new joiner
    if(!DB.users.find(u=>u.email===e.email)&&e.email){DB.users.push({email:e.email.toLowerCase(),pass:'demo',role:'employee',employeeId:e.id});}
    if(!docsForEmp(e.id).length){DB.docTypes.forEach((t,i)=>DB.documents.push({id:'D'+e.id+'_'+i,employeeId:e.id,type:t,status:'requested',fileName:null,uploadedAt:null}));}
  }
  save();toast('Offer approved & released — '+(e?e.name:'')+' can now onboard');buildNav();vApprovals();
}
function rejectOffer(id){const o=DB.offers.find(x=>x.id===id);if(!o)return;o.status='rejected';const e=empById(o.employeeId);if(e)e.status='declined';save();toast('Offer rejected');buildNav();vApprovals();}

function vBoard(){
  const stages=[['offered','Offered'],['onboarding','Onboarding'],['active','Active'],['exited','Exited']];
  const cols=stages.map(s=>{const list=DB.employees.filter(e=>e.status===s[0]);
    return `<div class="card card-pad" style="flex:1;min-width:180px"><div style="font-weight:700;font-size:13px;margin-bottom:10px">${s[1]} <span class="pill ${s[0]}">${list.length}</span></div>${list.map(e=>`<div style="border:1px solid var(--rule);border-radius:9px;padding:10px;margin-bottom:8px;cursor:pointer" onclick="openEmp('${e.id}')"><b style="font-size:13px">${esc(e.name)}</b><div class="small muted">${esc(e.desig)} · ${esc(e.code)}</div></div>`).join('')||'<div class="empty" style="padding:12px">—</div>'}</div>`;}).join('');
  $('view').innerHTML=`<div><h1 class="page">Lifecycle board</h1><p class="page-sub">Where each person is in the journey. Click anyone to open their full record.</p></div><div class="row">${cols}</div>`;
}
function vDirectory(){
  const rows=DB.employees.map(e=>`<tr class="click" onclick="openEmp('${e.id}')"><td><b>${esc(e.name)}</b></td><td>${esc(e.code)}</td><td>${esc(e.desig)}</td><td>${esc(e.dept)}</td><td>${esc(e.level)}</td><td><span class="pill ${e.status}">${esc(e.status)}</span></td></tr>`).join('');
  $('view').innerHTML=`<div><h1 class="page">Directory</h1><p class="page-sub">Everyone in the system. Click a row for the full 360 record.</p></div>
   <div class="card"><table class="list"><tr><th>Name</th><th>Code</th><th>Designation</th><th>Dept</th><th>Level</th><th>Status</th></tr>${rows}</table></div>`;
}
function openEmp(id){_emp360=id;go('directory');setTimeout(()=>renderEmp360(id),10);}
let _emp360=null;
function renderEmp360(id){
  const e=empById(id);if(!e)return;const off=offerForEmp(id),t=tenure(e.doj),docs=docsForEmp(id);
  const mgr=e.managerId?empById(e.managerId):null;
  $('view').innerHTML=`
   <div style="display:flex;align-items:center;gap:14px"><button class="btn btn-ghost btn-sm" onclick="vDirectory()">← Directory</button></div>
   <div class="card card-pad"><div style="display:flex;align-items:center;gap:16px"><div class="avatar lg">${initials(e.name)}</div>
     <div><h1 class="page" style="font-size:21px">${esc(e.name)}</h1><p class="page-sub">${esc(e.desig)} · ${esc(e.dept)} · ${esc(e.code)} · <span class="pill ${e.status}">${esc(e.status)}</span></p></div></div>
   </div>
   <div class="info-grid">
     <div class="info-cell"><div class="k">Level</div><div class="v">${esc(e.level)}</div></div>
     <div class="info-cell"><div class="k">Date of joining</div><div class="v">${dfmt(e.doj)}</div></div>
     <div class="info-cell"><div class="k">Tenure</div><div class="v">${t.y}y ${t.mo}m ${t.d}d</div></div>
     <div class="info-cell"><div class="k">Reporting to</div><div class="v" style="font-size:13px">${mgr?esc(mgr.name):'—'}</div></div>
     <div class="info-cell"><div class="k">Phone</div><div class="v" style="font-size:13px">${esc(e.phone||'—')}</div></div>
     <div class="info-cell"><div class="k">Work email</div><div class="v" style="font-size:13px">${esc(e.email||'—')}</div></div>
   </div>
   <div class="card card-pad">
     <div class="sec-h"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICONS.pay}</svg></div><h2>Compensation</h2></div>
     ${off?`<div class="breakup"><div class="bl"><span>Annual CTC</span><span class="num">${fmt(off.ctc)}</span></div><div class="bl tot"><span>Monthly gross</span><span class="num">${fmt(calc(off.ctc).m)}</span></div></div>`:'<div class="empty">No offer on record.</div>'}
   </div>
   <div class="card card-pad">
     <div class="sec-h"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICONS.onboard}</svg></div><h2>Documents</h2></div>
     ${docs.length?docs.map(d=>`<div class="doc"><div class="di"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
        <div class="dt"><b>${esc(d.type)}</b><div class="dm">${d.status==='requested'?'Awaiting upload':((d.fileName||'')+' · '+dfmt(d.uploadedAt))}</div></div>
        ${d.status==='uploaded'?`<button class="btn btn-green btn-sm" onclick="verifyDoc('${d.id}','${id}')">Verify</button>`:`<span class="pill ${d.status}">${d.status==='verified'?'Verified':(d.status==='requested'?'Pending':'Uploaded')}</span>`}
      </div>`).join(''):'<div class="empty">No documents requested.</div>'}
   </div>`;
  $('topTitle').textContent=e.name;
}
function verifyDoc(did,eid){const d=DB.documents.find(x=>x.id===did);if(d){d.status='verified';save();toast('Document verified');}renderEmp360(eid);}

function vHrDocs(){
  const rows=DB.employees.map(e=>{const docs=docsForEmp(e.id);if(!docs.length)return'';const v=docs.filter(d=>d.status==='verified').length,u=docs.filter(d=>d.status==='uploaded').length;
    return `<tr class="click" onclick="openEmp('${e.id}')"><td><b>${esc(e.name)}</b><div class="small muted">${esc(e.code)}</div></td><td><span class="pill ${e.status}">${esc(e.status)}</span></td><td class="num">${v}/${docs.length} verified</td><td>${u?`<span class="pill uploaded">${u} to review</span>`:'<span class="small muted">—</span>'}</td></tr>`;}).join('');
  $('view').innerHTML=`<div><h1 class="page">Documents</h1><p class="page-sub">Every employee's joining documents. Review and verify uploads.</p></div>
   <div class="card"><table class="list"><tr><th>Employee</th><th>Status</th><th>Verified</th><th>To review</th></tr>${rows}</table></div>`;
}

/* ---------- toast ---------- */
function toast(msg){const t=document.createElement('div');t.className='toast';t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#A4F4C6"><path d="M20 6L9 17l-5-5"/></svg>'+esc(msg);document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}

/* ---------- demo login buttons ---------- */
function renderPortals(){
  const ic={
    employee:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 14h5"/>',
    hrbp:'<circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/>',
    gm:'<circle cx="12" cy="7" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/><path d="M19 3l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/>',
    ta:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11l-3 3-2-2"/>'};
  $('demoGrid').innerHTML=PORTALS.map(p=>`<button class="demo-btn" onclick="enterPortal('${p.key}')"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ic[p.key]||ic.employee}</svg></div><div><div class="t">${p.label}</div><div class="d">${p.desc}</div></div></button>`).join('');
}

/* ---------- boot ---------- */
load();renderPortals();
</script>
</body>
</html>
