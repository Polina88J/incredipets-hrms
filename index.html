<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IncrediPets HRMS — prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#FF007F;--amaranth:#B00050;--logo:#8A003E;--aqua:#A4F4C6;--pale:#EBD4F5;--green:#2E9D52;
    --ink:#1F1F1F;--muted:#5A5A5A;--rule:#E7E5EA;--bg:#B00050;--soft:#FAF8FC;--surface:#fff;
    --radius:14px;--shadow:0 1px 3px rgba(20,10,30,.06);--shadow-lg:0 12px 34px rgba(80,10,50,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .num{font-variant-numeric:tabular-nums}
  svg{width:20px;height:20px;stroke-width:1.9;flex:none}
  button{font:inherit;cursor:pointer}
  .hidden{display:none!important}

  /* ---- prototype banner ---- */
  .proto{background:#fff8e6;border-bottom:1px solid #f3d98a;color:#a8761a;font-size:12px;font-weight:700;
         text-align:center;padding:6px 12px;letter-spacing:.3px}

  /* ---- login ---- */
  .login{min-height:100dvh;display:flex;align-items:center;justify-content:center;
         background:radial-gradient(1200px 600px at 50% -10%,#fff,var(--bg))}
  .login-card{background:#fff;border:1px solid var(--rule);border-radius:20px;box-shadow:var(--shadow-lg);
              padding:38px 36px;width:min(440px,92vw);text-align:center}
  .lg-brand{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:6px}
  .lg-brand .mark{width:40px;height:40px;border-radius:11px;background:var(--logo);color:#fff;
              display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
  .lg-brand .wm{font-weight:800;font-size:21px;letter-spacing:-.4px}
  .lg-brand .wm b{color:var(--logo)}
  .login h2{font-size:16px;margin:18px 0 4px}
  .login p{color:var(--muted);font-size:13.5px;margin-bottom:22px}
  .role-pick{display:flex;flex-direction:column;gap:10px}
  .role-btn{display:flex;align-items:center;gap:13px;text-align:left;background:#fff;border:1.5px solid var(--rule);
            border-radius:12px;padding:13px 15px;transition:all .16s}
  .role-btn:hover{border-color:var(--rose);background:#fff5fa}
  .role-btn .ic{width:38px;height:38px;border-radius:10px;background:var(--pale);color:var(--amaranth);
            display:flex;align-items:center;justify-content:center}
  .role-btn .t{font-weight:700;font-size:14.5px}
  .role-btn .d{font-size:12px;color:var(--muted)}
  .login .foot{margin-top:20px;font-size:11px;color:#b9b3c0}

  /* ---- app shell ---- */
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100dvh}
  .side{background:var(--surface);border-right:1px solid var(--rule);padding:20px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100dvh}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
  .brand .mark{width:32px;height:32px;border-radius:9px;background:var(--logo);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .brand .wm{font-weight:800;font-size:16px} .brand .wm b{color:var(--logo)}
  .nav-label{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#a59fae;padding:12px 10px 5px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);font-weight:600;font-size:14px;border:none;background:none;width:100%;text-align:left;transition:all .15s}
  .nav-item svg{width:18px;height:18px}
  .nav-item:hover{background:var(--soft);color:var(--ink)}
  .nav-item.active{background:var(--pale);color:var(--amaranth)}
  .side-foot{margin-top:auto;border-top:1px solid var(--rule);padding-top:10px}
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:14px;padding:0 26px;position:sticky;top:0;z-index:10}
  .topbar .ttl{font-weight:700;font-size:16px}
  .topbar .role-tag{font-size:11px;font-weight:700;background:var(--pale);color:var(--amaranth);padding:4px 10px;border-radius:20px;margin-left:4px}
  .spacer{flex:1}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--amaranth));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
  .content{padding:26px;max-width:1000px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:22px}

  h1.page{font-size:23px;letter-spacing:-.5px}
  .page-sub{color:var(--muted);font-size:14px;margin-top:2px}
  .card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-pad{padding:22px 24px}
  .sec-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sec-h .si{width:32px;height:32px;border-radius:9px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center}
  .sec-h h2{font-size:16px}

  /* forms */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12.5px;font-weight:700;color:var(--muted)}
  .field input,.field select{font:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--rule);border-radius:10px;background:#fff;outline:none;transition:border .15s}
  .field input:focus,.field select:focus{border-color:var(--rose)}
  .lock-row{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#a8761a;background:#fff8e6;border:1px solid #f3d98a;border-radius:8px;padding:7px 11px;margin-top:4px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;border-radius:10px;padding:11px 18px;border:1px solid transparent;transition:all .16s}
  .btn svg{width:17px;height:17px}
  .btn-primary{background:var(--rose);color:#fff} .btn-primary:hover{background:var(--amaranth)}
  .btn-ghost{background:#fff;border-color:var(--rule);color:var(--ink)} .btn-ghost:hover{background:var(--soft)}
  .btn-green{background:var(--green);color:#fff} .btn-green:hover{filter:brightness(.93)}

  /* breakup live panel */
  .breakup{background:var(--soft);border:1px solid var(--rule);border-radius:12px;padding:16px 18px}
  .breakup h4{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .bl{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px}
  .bl span:first-child{color:var(--muted)} .bl span:last-child{font-weight:700}
  .bl.tot{border-top:1px dashed var(--rule);margin-top:6px;padding-top:9px}
  .bl.tot span{color:var(--amaranth);font-weight:800;font-size:15px}

  /* offer letter */
  .letter{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:30px 34px;box-shadow:var(--shadow);position:relative;max-width:720px;margin:0 auto}
  .letter .lh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--amaranth);padding-bottom:14px;margin-bottom:18px}
  .letter .lh .wm{font-weight:800;font-size:20px} .letter .lh .wm b{color:var(--logo)}
  .letter .lh .co{font-size:11px;color:var(--muted);margin-top:2px}
  .letter h3{color:var(--amaranth);font-size:16px;text-align:center;letter-spacing:.5px;margin:6px 0 16px}
  .letter p{font-size:13.5px;margin:9px 0;color:#333}
  .letter table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
  .letter th,.letter td{border:1px solid var(--rule);padding:8px 11px;text-align:left}
  .letter th{background:var(--soft);font-weight:700}
  .letter td:last-child,.letter th:last-child{text-align:right}
  .letter .sign{margin-top:26px;display:flex;justify-content:space-between;font-size:13px}
  .stamp{position:absolute;top:18px;right:26px;font-size:10px;font-weight:800;letter-spacing:1px;color:#a8761a;background:#fff8e6;border:1px solid #f3d98a;padding:4px 9px;border-radius:6px}

  /* table list */
  table.list{width:100%;border-collapse:collapse;font-size:13.5px}
  table.list th{text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--rule)}
  table.list td{padding:12px;border-bottom:1px solid var(--rule)}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .pill.offer{background:var(--pale);color:var(--amaranth)} .pill.active{background:var(--aqua);color:#0c5a2e}
  .pill.accepted{background:#dff0ff;color:#0369a1}
  .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border-radius:12px;overflow:hidden}
  .info-cell{background:#fff;padding:15px 16px}
  .info-cell .k{font-size:12px;color:var(--muted);font-weight:600}
  .info-cell .v{font-weight:700;font-size:14.5px;margin-top:5px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;gap:10px;align-items:center;z-index:100}
  @media (max-width:820px){.app{grid-template-columns:1fr}.side{display:none}.grid2{grid-template-columns:1fr}.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-card">
    <div class="lg-brand"><div class="mark">IP</div><div class="wm"><b>Incredi</b>Pets</div></div>
    <div style="font-size:13px;color:var(--muted);font-weight:600">HRMS</div>
    <h2>Sign in</h2>
    <p>Choose a role to preview that portal</p>
    <div class="role-pick">
      <button class="role-btn" onclick="enter('recruiter')">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11l-3 3-2-2"/></svg></div>
        <div><div class="t">Recruiter (TA)</div><div class="d">Create candidate · roll out offer letters</div></div>
      </button>
      <button class="role-btn" onclick="enter('hr')">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg></div>
        <div><div class="t">HR Admin (HRBP / GM)</div><div class="d">Run the lifecycle · all records</div></div>
      </button>
      <button class="role-btn" onclick="enter('employee')">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 14h5"/></svg></div>
        <div><div class="t">Employee</div><div class="d">My profile · payslips · leave</div></div>
      </button>
    </div>
    <div class="foot">Prototype · front-end only · no real data stored</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <aside class="side">
    <div class="brand"><div class="mark">IP</div><div class="wm"><b>Incredi</b>Pets</div></div>
    <div id="nav"></div>
    <div class="side-foot">
      <button class="nav-item" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>Switch role</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <span class="ttl" id="topTitle">—</span><span class="role-tag" id="roleTag"></span>
      <span class="spacer"></span>
      <div class="avatar" id="topAvatar">?</div>
    </div>
    <div class="content" id="view"></div>
  </div>
</div>

<script>
// ---------- seed data (in-memory only) ----------
const PROTO = { proto:true };
let candidates = [
  {code:'IN-318', name:'Rohit Verma', desig:'Field Sales Executive', dept:'Supply', doj:'2026-06-10', loc:'Gurugram', mgr:'Ankit', ctc:360000, status:'Offered'},
  {code:'IN-319', name:'Sneha Iyer', desig:'CRM Associate', dept:'Customer Care', doj:'2026-06-09', loc:'Gurugram', mgr:'Rashid', ctc:300000, status:'Accepted'},
];
let role='employee';
const ROLES={
  recruiter:{tag:'Recruiter',av:'AN',title:'Recruitment'},
  hr:{tag:'HR Admin',av:'PJ',title:'HR Admin'},
  employee:{tag:'Employee',av:'JK',title:'My Portal'}
};
const fmt=n=>'₹ '+Number(n).toLocaleString('en-IN');

function enter(r){role=r;document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');
  document.getElementById('roleTag').textContent=ROLES[r].tag;document.getElementById('topAvatar').textContent=ROLES[r].av;buildNav();}
function logout(){document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');}

function buildNav(){
  const nav=document.getElementById('nav');let items=[];
  if(role==='recruiter') items=[['New Offer','offer'],['My Offers','offers']];
  if(role==='hr') items=[['Lifecycle Board','board'],['Directory','directory'],['New Offer','offer']];
  if(role==='employee') items=[['My Profile','profile'],['Salary Slips','slips'],['Reporting','reporting'],['Leave','leave']];
  nav.innerHTML='<div class="nav-label">'+ROLES[role].title+'</div>'+items.map((it,i)=>
    `<button class="nav-item${i===0?' active':''}" onclick="go('${it[1]}',this)"><span style="width:18px"></span>${it[0]}</button>`).join('');
  go(items[0][1]);
}
function go(page,el){if(el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');}
  document.getElementById('topTitle').textContent=({offer:'New Offer',offers:'My Offers',board:'Lifecycle Board',directory:'Directory',profile:'My Profile',slips:'Salary Slips',reporting:'Reporting',leave:'Leave'})[page]||'';
  ({offer:vOffer,offers:vOffers,board:vBoard,directory:vDirectory,profile:vProfile,slips:vSlips,reporting:vReporting,leave:vLeave})[page]();}

// ---------- MODULE 1: OFFER ----------
function vOffer(){
  document.getElementById('view').innerHTML=`
   <div><h1 class="page">Roll out an offer</h1><p class="page-sub">Module 1 · creates the employee record + generates the offer letter from the HRMS</p></div>
   <div class="card card-pad">
     <div class="sec-h"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><h2>Candidate details</h2></div>
     <div class="grid2">
       <div class="field"><label>Full name</label><input id="f_name" placeholder="e.g. Priya Sharma"></div>
       <div class="field"><label>Designation</label><input id="f_desig" placeholder="e.g. Operations Associate"></div>
       <div class="field"><label>Department</label><input id="f_dept" placeholder="e.g. Operations"></div>
       <div class="field"><label>Location</label><input id="f_loc" value="Gurugram, Delhi NCR"></div>
       <div class="field"><label>Date of joining</label><input id="f_doj" type="date"></div>
       <div class="field"><label>Reporting manager</label><input id="f_mgr" placeholder="e.g. Rashid"></div>
     </div>
     <div class="sec-h" style="margin-top:22px"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg></div><h2>Compensation</h2></div>
     <div class="grid2">
       <div class="field"><label>Annual CTC (₹)</label><input id="f_ctc" type="number" placeholder="360000" oninput="liveBreakup()"></div>
       <div class="breakup" id="bk"><h4>Auto breakup (62 / 31 / 7)</h4><div style="color:var(--muted);font-size:13px">Enter CTC to see the split.</div></div>
     </div>
     <div class="lock-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;height:14px"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Comp is visible to you only for this candidate — never the company salary master.</div>
     <div style="margin-top:20px;display:flex;gap:10px"><button class="btn btn-primary" onclick="genOffer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Generate offer letter</button></div>
   </div>
   <div id="letterWrap"></div>`;
}
function calc(ctc){const m=ctc/12;return{m,basic:m*.62,hra:m*.31,spl:m*.07};}
function liveBreakup(){const ctc=+document.getElementById('f_ctc').value||0;const b=document.getElementById('bk');
  if(!ctc){b.innerHTML='<h4>Auto breakup (62 / 31 / 7)</h4><div style="color:var(--muted);font-size:13px">Enter CTC to see the split.</div>';return;}
  const c=calc(ctc);b.innerHTML=`<h4>Monthly breakup (62 / 31 / 7)</h4>
   <div class="bl"><span>Basic (62%)</span><span class="num">${fmt(Math.round(c.basic))}</span></div>
   <div class="bl"><span>HRA (31%)</span><span class="num">${fmt(Math.round(c.hra))}</span></div>
   <div class="bl"><span>Special allowance (7%)</span><span class="num">${fmt(Math.round(c.spl))}</span></div>
   <div class="bl tot"><span>Monthly gross</span><span class="num">${fmt(Math.round(c.m))}</span></div>
   <div class="bl"><span style="font-size:11px;color:#b9b3c0">PF on min(Basic, ₹15,000) · ESI if gross ≤ ₹21k</span><span></span></div>`;
}
function genOffer(){
  const g=id=>document.getElementById(id).value;
  const name=g('f_name')||'[Candidate Name]',ctc=+g('f_ctc')||0,c=calc(ctc);
  const code='IN-'+(320+candidates.length);
  document.getElementById('letterWrap').innerHTML=`
   <div class="card card-pad" style="margin-top:4px">
     <div class="sec-h"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div><h2>Offer letter preview</h2></div>
     <div class="letter">
       <div class="stamp">DRAFT</div>
       <div class="lh"><div><div class="wm"><b>Incredi</b>Pets</div><div class="co">Incredipets Pvt. Ltd. · Gurugram, Delhi NCR</div></div><div style="font-size:12px;color:var(--muted)">${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</div></div>
       <h3>LETTER OF OFFER</h3>
       <p>Dear <b>${name}</b>,</p>
       <p>We are delighted to offer you the position of <b>${g('f_desig')||'[Designation]'}</b> in the <b>${g('f_dept')||'[Department]'}</b> team at Incredipets Pvt. Ltd., based at ${g('f_loc')||'[Location]'}. Your tentative date of joining is <b>${g('f_doj')||'[DOJ]'}</b>, reporting to ${g('f_mgr')||'[Manager]'}.</p>
       <p>Your annual cost to company (CTC) is <b>${fmt(ctc)}</b>, structured monthly as follows:</p>
       <table><tr><th>Component</th><th>Monthly</th></tr>
         <tr><td>Basic (62%)</td><td class="num">${fmt(Math.round(c.basic))}</td></tr>
         <tr><td>HRA (31%)</td><td class="num">${fmt(Math.round(c.hra))}</td></tr>
         <tr><td>Special allowance (7%)</td><td class="num">${fmt(Math.round(c.spl))}</td></tr>
         <tr><th>Gross (monthly)</th><th class="num">${fmt(Math.round(c.m))}</th></tr></table>
       <p style="font-size:12px;color:var(--muted)">Statutory deductions (PF, ESI where applicable, TDS) apply as per law. Employment is subject to a standard probation period, background verification, and the company's policies. <i>[Standard clauses — confidentiality, notice period, non-solicit — to be finalised with the locked template.]</i></p>
       <div class="sign"><div>For Incredipets Pvt. Ltd.<br><br><b>Jiten Kakar</b><br>Founder &amp; CEO</div><div style="text-align:right">Accepted by<br><br>_______________<br>${name}</div></div>
     </div>
     <div style="margin-top:18px;display:flex;gap:10px;justify-content:center">
       <button class="btn btn-ghost" onclick="liveBreakup()">Edit</button>
       <button class="btn btn-green" onclick="release('${code}','${name.replace(/'/g,"")}',${ctc})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>Release offer to candidate</button>
     </div>
   </div>`;
  document.getElementById('letterWrap').scrollIntoView({behavior:'smooth'});
}
function release(code,name,ctc){
  const g=id=>(document.getElementById(id)||{}).value||'';
  candidates.unshift({code,name,desig:g('f_desig')||'—',dept:g('f_dept')||'—',doj:g('f_doj')||'—',loc:g('f_loc')||'—',mgr:g('f_mgr')||'—',ctc,status:'Offered'});
  toast('Offer released to '+name+' · record '+code+' created');
  setTimeout(()=>go('offers',document.querySelectorAll('.nav-item')[1]),700);
}
function vOffers(){
  const rows=candidates.map(c=>`<tr><td><b>${c.name}</b><div style="font-size:11px;color:var(--muted)">${c.code} · ${c.desig}</div></td><td>${c.dept}</td><td>${c.doj}</td><td><span class="pill ${c.status.toLowerCase()}">${c.status}</span></td></tr>`).join('');
  document.getElementById('view').innerHTML=`<div><h1 class="page">My offers</h1><p class="page-sub">Candidates you've rolled offers to</p></div>
   <div class="card"><table class="list"><tr><th>Candidate</th><th>Dept</th><th>Joining</th><th>Status</th></tr>${rows}</table></div>`;
}
// ---------- HR ----------
function vBoard(){
  const stages=[['Offered','offer'],['Accepted','accepted'],['Active','active']];
  const cols=stages.map(s=>{const list=candidates.filter(c=>c.status===s[0]||(s[0]==='Active'&&c.status==='Active'));
    return `<div class="card card-pad" style="flex:1"><div style="font-weight:700;font-size:13px;margin-bottom:10px">${s[0]} <span class="pill ${s[1]}">${list.length}</span></div>${list.map(c=>`<div style="border:1px solid var(--rule);border-radius:9px;padding:10px;margin-bottom:8px"><b style="font-size:13px">${c.name}</b><div style="font-size:11px;color:var(--muted)">${c.desig} · ${c.code}</div></div>`).join('')||'<div style="color:#b9b3c0;font-size:12px">—</div>'}</div>`;}).join('');
  document.getElementById('view').innerHTML=`<div><h1 class="page">Lifecycle board</h1><p class="page-sub">Where each person is in the journey · Pooja (HRBP) runs this</p></div><div style="display:flex;gap:14px">${cols}</div>`;
}
function vDirectory(){
  const rows=candidates.map(c=>`<tr><td><b>${c.name}</b></td><td>${c.code}</td><td>${c.desig}</td><td>${c.dept}</td><td>${c.mgr}</td><td><span class="pill ${c.status.toLowerCase()}">${c.status}</span></td></tr>`).join('');
  document.getElementById('view').innerHTML=`<div><h1 class="page">Directory</h1><p class="page-sub">All records · comp hidden unless you're in the tier</p></div>
   <div class="card"><table class="list"><tr><th>Name</th><th>Code</th><th>Designation</th><th>Dept</th><th>Manager</th><th>Status</th></tr>${rows}</table></div>`;
}

function toast(msg){const t=document.createElement('div');t.className='toast';t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#A4F4C6"><path d="M20 6L9 17l-5-5"/></svg>'+msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
