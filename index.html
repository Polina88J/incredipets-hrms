<style>
  :root{
    --rose:#FF007F;--amaranth:#B00050;--logo:#8A003E;--aqua:#A4F4C6;--pale:#EBD4F5;--green:#2E9D52;
    --ink:#1F1F1F;--muted:#5A5A5A;--rule:#E7E5EA;--bg:#F4F4F7;--soft:#FAF8FC;--surface:#fff;
    --amber:#a8761a;--amber-bg:#fff8e6;--amber-rule:#f3d98a;
    --radius:14px;--shadow:0 1px 3px rgba(20,10,30,.06);--shadow-lg:0 12px 34px rgba(80,10,50,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .num{font-variant-numeric:tabular-nums}
  svg{width:20px;height:20px;stroke-width:1.9;flex:none}
  button{font:inherit;cursor:pointer}
  .hidden{display:none!important}
  a{color:var(--amaranth)}

  /* ---- prototype banner ---- */
  .proto{background:var(--amber-bg);border-bottom:1px solid var(--amber-rule);color:var(--amber);font-size:12px;font-weight:700;
         text-align:center;padding:6px 12px;letter-spacing:.3px}

  /* ---- login ---- */
  .login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;
         background:radial-gradient(1100px 560px at 50% -10%,#fff,var(--bg))}
  .login-card{background:#fff;border:1px solid var(--rule);border-radius:20px;box-shadow:var(--shadow-lg);
              padding:34px 34px;width:min(430px,94vw)}
  .lg-brand{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:4px}
  .lg-brand .mark{width:40px;height:40px;border-radius:11px;background:var(--logo);color:#fff;
              display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
  .lg-brand .wm{font-weight:800;font-size:21px;letter-spacing:-.4px}
  .lg-brand .wm b{color:var(--logo)}
  .login .sub{text-align:center;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:22px}
  .login h2{font-size:15px;margin:0 0 4px}
  .login .err{background:#fdecef;border:1px solid #f5c2d1;color:#a81243;font-size:12.5px;font-weight:600;border-radius:9px;padding:9px 12px;margin-bottom:12px}
  .demo-box{margin-top:20px;border-top:1px dashed var(--rule);padding-top:16px}
  .demo-box .lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#a59fae;margin-bottom:9px}
  .demo-grid{display:flex;flex-direction:column;gap:7px}
  .demo-btn{display:flex;align-items:center;gap:11px;text-align:left;background:#fff;border:1.5px solid var(--rule);
            border-radius:11px;padding:10px 13px;transition:all .15s;width:100%}
  .demo-btn:hover{border-color:var(--rose);background:#fff5fa}
  .demo-btn .ic{width:34px;height:34px;border-radius:9px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center}
  .demo-btn .t{font-weight:700;font-size:13.5px}
  .demo-btn .d{font-size:11.5px;color:var(--muted)}
  .login .foot{margin-top:18px;font-size:11px;color:#b9b3c0;text-align:center}
  .login .foot a{cursor:pointer;text-decoration:underline}
  .emailbox{margin-top:16px;border-top:1px dashed var(--rule);padding-top:14px;text-align:center}
  .emailbox .toggle{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--muted)}
  .emailbox .toggle:hover{color:var(--amaranth)}

  /* ---- app shell ---- */
  .app{display:grid;grid-template-columns:242px 1fr;min-height:100dvh}
  .side{background:var(--surface);border-right:1px solid var(--rule);padding:18px 14px;display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100dvh;overflow-y:auto;overscroll-behavior:contain}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 14px}
  .brand .mark{width:32px;height:32px;border-radius:9px;background:var(--logo);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .brand .wm{font-weight:800;font-size:16px} .brand .wm b{color:var(--logo)}
  .nav-label{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#a59fae;padding:12px 10px 5px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--muted);font-weight:600;font-size:13.5px;border:none;background:none;width:100%;text-align:left;transition:all .15s}
  .nav-item svg{width:18px;height:18px}
  .nav-item:hover{background:var(--soft);color:var(--ink)}
  .nav-item.active{background:var(--pale);color:var(--amaranth)}
  .nav-item .badge{margin-left:auto;font-size:10.5px;font-weight:800;background:var(--rose);color:#fff;border-radius:20px;padding:1px 7px}
  .side-foot{margin-top:auto;border-top:1px solid var(--rule);padding-top:10px}
  .me{display:flex;align-items:center;gap:10px;padding:6px 8px 12px}
  .me .nm{font-weight:700;font-size:13px;line-height:1.2}
  .me .rl{font-size:11px;color:var(--muted)}
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:14px;padding:0 26px;position:sticky;top:0;z-index:10}
  .topbar .ttl{font-weight:700;font-size:16px}
  .topbar .role-tag{font-size:11px;font-weight:700;background:var(--pale);color:var(--amaranth);padding:4px 10px;border-radius:20px}
  .spacer{flex:1}
  .hamburger{display:none;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--rule);border-radius:10px;background:#fff;color:var(--ink);flex:none}
  .hamburger svg{width:20px;height:20px}
  #sideBackdrop{display:none}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--amaranth));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:none}
  .avatar.sm{width:30px;height:30px;font-size:12px}
  .avatar.lg{width:56px;height:56px;font-size:20px}
  .content{padding:26px;max-width:1040px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px}

  h1.page{font-size:23px;letter-spacing:-.5px}
  .page-sub{color:var(--muted);font-size:14px;margin-top:2px}
  .card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-pad{padding:22px 24px}
  .sec-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sec-h .si{width:32px;height:32px;border-radius:9px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center}
  .sec-h h2{font-size:16px}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .muted{color:var(--muted)}
  .small{font-size:12px}

  /* stat tiles */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .stat{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600}
  .stat .v{font-weight:800;font-size:22px;margin-top:4px;letter-spacing:-.5px}
  .stat .v small{font-size:13px;font-weight:700;color:var(--muted)}
  .stat .sub{font-size:11.5px;color:var(--muted);margin-top:2px}

  /* forms */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.full{grid-column:1/-1}
  .field label{font-size:12.5px;font-weight:700;color:var(--muted)}
  .field input,.field select,.field textarea{font:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--rule);border-radius:10px;background:#fff;outline:none;transition:border .15s;width:100%}
  .field textarea{resize:vertical;min-height:90px}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--rose)}
  .lock-row{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-rule);border-radius:8px;padding:7px 11px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;border-radius:10px;padding:11px 18px;border:1px solid transparent;transition:all .16s}
  .btn svg{width:17px;height:17px}
  .btn-primary{background:var(--rose);color:#fff} .btn-primary:hover{background:var(--amaranth)}
  .btn-ghost{background:#fff;border-color:var(--rule);color:var(--ink)} .btn-ghost:hover{background:var(--soft)}
  .btn-green{background:var(--green);color:#fff} .btn-green:hover{filter:brightness(.93)}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
  .btn-block{width:100%}

  /* breakup live panel */
  .breakup{background:var(--soft);border:1px solid var(--rule);border-radius:12px;padding:16px 18px}
  .breakup h4{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .bl{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px}
  .bl span:first-child{color:var(--muted)} .bl span:last-child{font-weight:700}
  .bl.tot{border-top:1px dashed var(--rule);margin-top:6px;padding-top:9px}
  .bl.tot span{color:var(--amaranth);font-weight:800;font-size:15px}

  /* offer letter */
  .letter{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:30px 34px;box-shadow:var(--shadow);position:relative;max-width:720px;margin:0 auto}
  .letter .lh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--amaranth);padding-bottom:14px;margin-bottom:18px}
  .letter .lh .wm{font-weight:800;font-size:20px} .letter .lh .wm b{color:var(--logo)}
  .letter .lh .co{font-size:11px;color:var(--muted);margin-top:2px}
  .letter h3{color:var(--amaranth);font-size:16px;text-align:center;letter-spacing:.5px;margin:6px 0 16px}
  .letter p{font-size:13.5px;margin:9px 0;color:#333}
  .letter table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
  .letter th,.letter td{border:1px solid var(--rule);padding:8px 11px;text-align:left}
  .letter th{background:var(--soft);font-weight:700}
  .letter td:last-child,.letter th:last-child{text-align:right}
  .letter .sign{margin-top:26px;display:flex;justify-content:space-between;font-size:13px}
  .stamp{position:absolute;top:18px;right:26px;font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 9px;border-radius:6px}
  .stamp.draft{color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-rule)}
  .stamp.approved{color:#0c5a2e;background:var(--aqua);border:1px solid #7fe0a6}

  /* table list */
  table.list{width:100%;border-collapse:collapse;font-size:13.5px}
  table.list th{text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--rule)}
  table.list td{padding:12px 14px;border-bottom:1px solid var(--rule);vertical-align:middle}
  table.list tr:last-child td{border-bottom:none}
  table.list tr.click{cursor:pointer} table.list tr.click:hover td{background:var(--soft)}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;white-space:nowrap}
  .pill.offered,.pill.pending_approval,.pill.offer{background:var(--pale);color:var(--amaranth)}
  .pill.active,.pill.approved,.pill.verified{background:var(--aqua);color:#0c5a2e}
  .pill.accepted,.pill.released{background:#dff0ff;color:#0369a1}
  .pill.onboarding{background:#fef3d6;color:#a8761a}
  .pill.offboarding{background:#fde2cf;color:#9a4a16}
  .pill.uploaded{background:#dff0ff;color:#0369a1}
  .pill.requested,.pill.pending{background:#f0eef3;color:#6b6577}
  .pill.declined,.pill.rejected,.pill.exited{background:#fdecef;color:#a81243}

  .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border-radius:12px;overflow:hidden}
  .info-cell{background:#fff;padding:14px 16px}
  .info-cell .k{font-size:12px;color:var(--muted);font-weight:600}
  .info-cell .v{font-weight:700;font-size:14.5px;margin-top:5px}

  /* progress bar */
  .bar{height:9px;background:#ece9f1;border-radius:20px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--rose),var(--amaranth));border-radius:20px}
  .bar.green > i{background:linear-gradient(90deg,#54c97e,var(--green))}

  /* doc rows */
  .doc{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--rule)}
  .doc:last-child{border-bottom:none}
  .doc .di{width:40px;height:40px;border-radius:10px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center;flex:none}
  .doc .dt{flex:1;min-width:0}
  .doc .dt b{font-size:14px}
  .doc .dt .dm{font-size:12px;color:var(--muted)}

  /* timeline / tenure */
  .tl{position:relative;padding-left:26px}
  .tl::before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--rule)}
  .tl .ti{position:relative;padding:0 0 16px}
  .tl .ti:last-child{padding-bottom:0}
  .tl .ti::before{content:'';position:absolute;left:-23px;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2.5px solid var(--rose)}
  .tl .ti.done::before{background:var(--rose)}
  .tl .ti b{font-size:13.5px} .tl .ti .tm{font-size:12px;color:var(--muted)}

  /* ladder */
  .ladder{display:flex;flex-direction:column;gap:10px}
  .rung{display:flex;align-items:flex-start;gap:14px;border:1.5px solid var(--rule);border-radius:12px;padding:14px 16px;background:#fff}
  .rung.cur{border-color:var(--amaranth);background:#fff5fa}
  .rung.next{border-color:#7fe0a6;background:#f1fcf5}
  .rung .lv{width:42px;height:42px;border-radius:11px;background:var(--pale);color:var(--amaranth);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex:none}
  .rung.next .lv{background:var(--aqua);color:#0c5a2e}
  .rung .lt{flex:1;min-width:0}
  .rung .lt b{font-size:14.5px}
  .rung .lt .ld{font-size:12.5px;color:var(--muted);margin-top:1px}
  .req{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-top:6px}
  .req .ck{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:11px;font-weight:800}
  .req .ck.ok{background:var(--aqua);color:#0c5a2e} .req .ck.no{background:#f0eef3;color:#9b95a6}

  /* tabs */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--rule);margin-bottom:18px}
  .tab{padding:9px 14px;font-weight:700;font-size:13.5px;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--amaranth);border-bottom-color:var(--amaranth)}

  .empty{color:#b9b3c0;font-size:13px;text-align:center;padding:26px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;gap:10px;align-items:center;z-index:100;max-width:90vw}

  /* org chart — visual top-down genealogical tree with connectors */
  .org-canvas{background:#ffffff;border:1px solid var(--rule);border-radius:16px;padding:26px 18px 30px;overflow:auto}
  .org-head{text-align:center;margin-bottom:20px}
  .org-head .oh-logo{font-weight:800;font-size:20px;letter-spacing:.2px}
  .org-head .oh-logo b{color:var(--amaranth)}
  .org-head .oh-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .org-legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:12px;font-size:11px;color:var(--muted)}
  .org-legend span{display:inline-flex;align-items:center;gap:5px}
  .org-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .tree{min-width:max-content;padding:8px 4px 16px;margin:0 auto}
  .tree ul{position:relative;padding-top:26px;display:flex;justify-content:center;margin:0;list-style:none}
  .tree li{list-style:none;position:relative;padding:26px 11px 0;text-align:center;display:flex;flex-direction:column;align-items:center}
  .tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid #d9c2cf;width:50%;height:26px}
  .tree li::after{right:auto;left:50%;border-left:2px solid #d9c2cf}
  .tree li:only-child::after,.tree li:only-child::before{display:none}
  .tree li:only-child{padding-top:0}
  .tree li:first-child::before,.tree li:last-child::after{border:0 none}
  .tree li:last-child::before{border-right:2px solid #d9c2cf}
  .tree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid #d9c2cf;width:0;height:26px}
  .tree>ul{padding-top:0}
  .tree>ul::before{display:none}
  .orgcard{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--rule);border-top:4px solid var(--rule);border-radius:12px;padding:9px 13px;cursor:pointer;background:#fff;transition:all .15s;text-align:left;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .orgcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);transform:translateY(-1px)}
  .orgcard .oc-t b{font-size:13px;display:block;line-height:1.2}
  .orgcard .oc-t .oc-d{font-size:11px;color:var(--muted);line-height:1.25;margin-top:1px}
  .orgcard .oc-lv{margin-left:6px;font-size:10px;font-weight:800;color:#fff;background:#9aa0a6;border-radius:6px;padding:2px 6px}
  .orgcard.lv6{border-top-color:#B00050} .orgcard.lv6 .oc-lv{background:#B00050}
  .orgcard.lv5{border-top-color:#8e44ad} .orgcard.lv5 .oc-lv{background:#8e44ad}

function tenure(doj){
  const a=new Date(doj),b=new Date();
  if(a>b)return{y:0,mo:0,d:0,totalDays:0,totalMonths:0,future:true}; // not joined yet
  let y=b.getFullYear()-a.getFullYear(),mo=b.getMonth()-a.getMonth(),d=b.getDate()-a.getDate();
  if(d<0){mo--;const pm=new Date(b.getFullYear(),b.getMonth(),0).getDate();d+=pm;}
  if(mo<0){y--;mo+=12;}
  const totalDays=Math.floor((b-a)/86400000);
  const totalMonths=y*12+mo;
  return{y,mo,d,totalDays,totalMonths};
}

/* ===== Analytics — privacy-safe interaction tracking (PostHog) =====
   Captures WHAT users do (pages, clicks, actions, by role) — never salary or PII.
   _phSan() strips any ₹ amount or 3+ digit number out of every string before it is sent. */
let _curPage='login';
function _phSan(s){ if(s==null) return s; s=String(s); if(s.length>90) s=s.slice(0,90);
  return s.replace(/₹\s*[\d.,]+/g,'₹#').replace(/\b\d[\d,]{2,}(?:\.\d+)?\b/g,'#').replace(/\s+/g,' ').trim(); }
function track(ev, props){
  try{ if(!(window.posthog&&posthog.capture)) return;
    var p={}; if(props) for(var k in props){ var v=props[k]; p[k]=(typeof v==='string')?_phSan(v):v; }
    if(typeof SES!=='undefined'&&SES){ if(!p.role)p.role=SES.realRole||SES.role; if(p.preview==null)p.preview=!!SES.preview; }
    if(!p.page)p.page=_curPage;
    posthog.capture(ev,p);
  }catch(e){}
}
// One delegated listener captures every meaningful click app-wide — label only, values sanitized.
document.addEventListener('click', function(e){
  try{
    var el=e.target&&e.target.closest&&e.target.closest('button, a, .nav-item, .btn, [data-track], [onclick]');
    if(!el) return;
    var raw=el.getAttribute('data-track')||el.textContent||el.getAttribute('aria-label')||'';
    var label=_phSan(raw);
    if(!label) return;
    var kind = el.classList.contains('nav-item')?'nav':(el.tagName==='A'?'link':'button');
    track('ui_click', {label:label, kind:kind});
  }catch(_e){}
}, true);

/* ---- Salary break-up calculator (matches the Recruitment Tracker "Salary Break up" tab) — driven by MONTHLY GROSS ---- */
function offerTDS(annualGross){
  var ti=Math.max(0,Math.round(annualGross)-75000); // new-regime std deduction
  if(ti<=1200000) return 0; // s.87A rebate — tax-free up to 12L taxable
  var edges=[[400000,0],[800000,0.05],[1200000,0.10],[1600000,0.15],[2000000,0.20],[2400000,0.25],[1e15,0.30]];
  var tax=0,prev=0; for(var i=0;i<edges.length;i++){ if(ti>prev){ tax+=(Math.min(ti,edges[i][0])-prev)*edges[i][1]; prev=edges[i][0]; } }
  var mr=ti-1200000; if(tax>mr) tax=mr; // marginal relief near the 12L threshold
  return Math.round(tax*1.04/12); // +4% cess, per month
}
function offerPfApplies(basic,pfHistory,pfPref){ if(basic<=15000) return true; if(pfHistory==='Yes') return true; if(pfPref==='Opt-in') return true; return false; }
function calcOffer(gross,pfHistory,pfPref){
  gross=Math.round(+gross||0);
  var basic=Math.round(gross*0.62), hra=Math.round(basic*0.5), spl=gross-basic-hra;
  var pfYes=offerPfApplies(basic,pfHistory,pfPref); var pfBasic=Math.min(basic,15000);
  var empPf=pfYes?Math.round(pfBasic*0.12):0; var esiYes=gross>0&&gross<=21000;
  var empEsi=esiYes?Math.round(gross*0.0075):0; var pt=gross>0?200:0; var tds=offerTDS(gross*12);
  var net=gross-empPf-empEsi-pt-tds;
  var erPf=pfYes?Math.round(pfBasic*0.12):0, erEsi=esiYes?Math.round(gross*0.0325):0, grat=Math.round(basic*0.0481);
  var ctcM=gross+erPf+erEsi+grat;
  return {gross:gross,basic:basic,hra:hra,spl:spl,pfYes:pfYes,empPf:empPf,empEsi:empEsi,esiYes:esiYes,pt:pt,tds:tds,net:net,erPf:erPf,erEsi:erEsi,grat:grat,ctcM:ctcM,ctcA:ctcM*12};
}

function mAddKpi(id){const name=prompt('KPI name (e.g. Monthly target)');if(!name)return;const target=parseFloat(prompt('Target (number)','100'))||0;const actual=parseFloat(prompt('Current actual (number)','0'))||0;const unit=(prompt('Unit (e.g. % — blank for none)','%')||'').trim();(DB.kpis[id]=DB.kpis[id]||[]).push({name:name.trim(),target,actual,unit});save();toast('KPI added');renderMReport(id);}
function mEditKpi(id,i){const k=(DB.kpis[id]||[])[i];if(!k)return;const v=prompt('Update actual for "'+k.name+'"',k.actual);if(v===null)return;k.actual=parseFloat(v)||0;save();renderMReport(id);}
function mAddAch(id){const t=prompt('Achievement / recognition');if(!t)return;(DB.achievements[id]=DB.achievements[id]||[]).push({title:t.trim(),date:new Date().toISOString().slice(0,10)});save();toast('Logged');renderMReport(id);}

function exportOffers(){const rows=DB.offers.map(o=>{const e=empById(o.employeeId);return e?[e.name,e.code,e.desig,e.dept,e.doj,o.status]:null;}).filter(Boolean);exportCSV('offers.csv',['Candidate','Code','Designation','Dept','Joining','Status'],rows);}
function exportPositions(){exportCSV('positions.csv',['Role','Dept','Level','Openings','Hiring manager','Band min','Band max','Status'],DB.positions.map(p=>[p.title,p.dept,p.level,p.openings,p.hiringManager,p.bandMin,p.bandMax,p.status]));}

function _rbKind(){ var k=$('rb_kind')&&$('rb_kind').value; var w=$('rb_advWrap'); if(w)w.style.display=(k==='prepaid')?'':'none'; }
async function reimbGrant(){
  var emp=($('rg_emp')&&$('rg_emp').value)||'', amount=Number(($('rg_amount')&&$('rg_amount').value)||0), purpose=(($('rg_purpose')&&$('rg_purpose').value)||'').trim();
  if(!emp){ toast('Choose an employee'); return; } if(!amount||amount<=0){ toast('Enter a valid amount'); return; }
  var res=await sb.rpc('reimb_create_advance',{p_code:_saveCreds.code,p_pass:_saveCreds.pass,p_emp:emp,p_amount:amount,p_purpose:purpose});

async function reimbReject(id){ var reason=prompt('Reason for rejecting this claim (the employee will see it):',''); if(reason===null)return; reimbClear(id,'reject',reason); }
async function reimbSettle(id,balance){ var b=Number(balance)||0; var ret=prompt('Settle this advance.\n'+(b>=0?('Unused balance: ₹'+_inr(b)):('Overspent by ₹'+_inr(-b)+' (owed to employee)'))+'\n\nAmount the employee RETURNED in cash (₹) — 0 if none:', b>0?String(Math.round(b)):'0'); if(ret===null)return; var note=prompt('Optional note (e.g. "returned in cash", "overspend reimbursed"):','')||''; var res=await sb.rpc('reimb_settle_advance',{p_code:_saveCreds.code,p_pass:_saveCreds.pass,p_id:id,p_returned:(Number(ret)||0),p_note:note}); if(res.error||!(res.data&&res.data.ok)){ toast('Could not settle advance'); return; } toast('Advance settled'); vReimburse(); }

async function reimbSubmit(){
  var kind=($('rb_kind')&&$('rb_kind').value)||'postpaid', amount=Number(($('rb_amount')&&$('rb_amount').value)||0), desc=(($('rb_desc')&&$('rb_desc').value)||'').trim(), cat=($('rb_cat')&&$('rb_cat').value)||'', edate=($('rb_date')&&$('rb_date').value)||'';
  var advId=kind==='prepaid'?(($('rb_adv')&&$('rb_adv').value)||''):'';
  if(!amount||amount<=0){ toast('Enter a valid amount'); return; }
  if(kind==='prepaid'&&!advId){ toast('Choose which advance this is against'); return; }
  var f=$('rb_bill')&&$('rb_bill').files&&$('rb_bill').files[0];
  if(!f){ toast('Please attach the bill / receipt'); return; }
  if(f.size>2600000){ toast('Bill file too large (max ~2.5 MB)'); return; }
  var billId=''; try{ var up=await liveDocUpload(SES.employeeId,'Reimbursement bill — '+(cat||'expense'),f); var rr=up&&up.data; if(rr&&rr.ok) billId=rr.id; }catch(e){}
  if(!billId){ toast('Bill upload failed — please try again'); return; }
  var res=await sb.rpc('reimb_submit_expense',{p_code:_saveCreds.code,p_pass:_saveCreds.pass,p_advance_id:advId||null,p_kind:kind,p_amount:amount,p_desc:desc,p_bill:billId,p_category:cat,p_expense_date:edate});
  if(res.error||!(res.data&&res.data.ok)){ toast('Could not submit claim'); return; }
  toast('Claim submitted — the accounts team will clear it'); vReimburse();
}

function payrollRows(){
  return DB.employees.filter(e=>['active','onboarding','offboarding'].indexOf(e.status)>-1).map(e=>{
    const o=offerForEmp(e.id);if(!o)return null;const c=calc(o.ctc);
    const pf=Math.round(Math.min(c.basic,15000)*0.12),esi=c.m<=21000?Math.round(c.m*0.0075):0;
    const L=DB.leave[e.id]||{lwp:0,absent:[]},lopDays=(L.lwp||0)+((L.absent||[]).length),lop=Math.round((c.m/30)*lopDays);
    const adv=(DB.advances||[]).filter(a=>a.employeeId===e.id&&a.status==='approved').reduce((s,a)=>s+a.amount,0),advRec=Math.min(adv,Math.round(c.m*0.25));
    const net=Math.round(c.m-pf-esi-lop-advRec);

  }).filter(Boolean);
}

       <div class="field"><label>Date of joining (first working day)</label><input id="ne_doj" type="date"></div>
       <div class="field"><label>Reporting manager</label><select id="ne_mgr"><option value="">—</option>${mgrs.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('')}</select></div>
       <div class="field"><label>Status</label><select id="ne_status"><option value="onboarding">Onboarding (new joiner)</option><option value="active">Active (already working)</option></select></div>
       <div class="field"><label>Phone</label><input id="ne_phone"></div>
       <div class="field"><label>Official email (used as login)</label><input id="ne_email" placeholder="name@incredipets.in"></div>
       <div class="field"><label>Personal email</label><input id="ne_pmail"></div>
       <div class="field"><label>Location</label><input id="ne_loc" value="Gurugram, Delhi NCR"></div>
     </div>
     <div style="margin-top:16px"><button class="btn btn-primary" onclick="createEmployee()">Create employee, login &amp; attach offer</button></div>
   </div>`;
}
function _ensurePdfJs(){ return new Promise(function(res,rej){ if(window.pdfjsLib){res();return;} var s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'; s.onload=function(){ try{ window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }catch(e){} res(); }; s.onerror=function(){ rej(new Error('pdfjs')); }; document.head.appendChild(s); }); }
async function _offerText(f){ if(/pdf/i.test(f.type)||/\.pdf$/i.test(f.name)){ await _ensurePdfJs(); var buf=await f.arrayBuffer(); var pdf=await window.pdfjsLib.getDocument({data:buf}).promise; var t=''; for(var i=1;i<=pdf.numPages;i++){ var pg=await pdf.getPage(i); var c=await pg.getTextContent(); t+=c.items.map(function(it){return it.str;}).join(' ')+'\\n'; } return t; } if(/text|csv/i.test(f.type)||/\.txt$/i.test(f.name)){ return await f.text(); } return ''; }
function _parseDate(s){ if(!s)return''; try{ var d=new Date(String(s).replace(/(\d+)(st|nd|rd|th)/i,'$1')); if(!isNaN(d.getTime())&&d.getFullYear()>2015&&d.getFullYear()<2100){ var mm=String(d.getMonth()+1),dd=String(d.getDate()); if(mm.length<2)mm='0'+mm; if(dd.length<2)dd='0'+dd; return d.getFullYear()+'-'+mm+'-'+dd; } }catch(e){} return ''; }
function _parseOffer(t){ t=(t||'').replace(/ /g,' ').replace(/\s+/g,' '); var g=function(re){ var m=re.exec(t); return m?m[1].trim().replace(/[\s.,;:]+$/,''):''; }; var d={}; d.name=g(/Dear\s+(?:Mr\.?\s+|Ms\.?\s+|Mrs\.?\s+)?([A-Z][A-Za-z.\-]+(?:\s+[A-Z][A-Za-z.\-]+){0,3})\s*[,\.]/); d.designation=g(/position of\s+(.+?)\s+in the\b/i)||g(/(?:designation|role|position)\s*[:\-]\s*([A-Za-z0-9 \/&\-]+?)(?:[.,]| in | at | department)/i); d.department=g(/in the\s+(.+?)\s+team\b/i)||g(/department\s*[:\-]\s*([A-Za-z0-9 \/&\-]+?)(?:[.,]|$)/i); d.location=g(/based (?:at|in|out of)\s+(.+?)[.,]/i)||g(/location\s*[:\-]\s*([A-Za-z ,\/\-]+?)[.,]/i); var dj=g(/date of joining\s+is\s+(.+?)[.,]/i)||g(/(?:joining date|date of joining|joining on)\s*[:\-]?\s*(.+?)[.,]/i); d.doj=_parseDate(dj); d.manager=g(/reporting to\s+(.+?)[.,]/i)||g(/reporting manager\s*[:\-]\s*([A-Za-z .]+?)[.,]/i); var ds=(d.designation||'').toLowerCase(); d.level=/head|chief|director|\bvp\b|vice president/.test(ds)?'L6':/senior manager|sr\.? manager|principal/.test(ds)?'L5':/manager|lead/.test(ds)?'L4':/senior|sr\.?/.test(ds)?'L3':/executive|associate|specialist|engineer|analyst|officer|coordinator/.test(ds)?'L2':'L1'; return d; }
async function onOfferSelected(){ var inp=$('ne_offer'); var f=inp&&inp.files&&inp.files[0]; if(!f)return; toast('Reading the offer letter…'); var text=''; try{ text=await _offerText(f); }catch(e){} if(!text||text.replace(/\s/g,'').length<20){ toast('Could not read this file automatically — please fill the details below'); return; } var d=_parseOffer(text); var set=function(id,v){ var el=$(id); if(el&&v&&!el.value) el.value=v; }; set('ne_name',d.name); set('ne_loc',d.location); set('ne_doj',d.doj); if(d.manager&&$('ne_mgr')){ var mn=(d.manager||'').toLowerCase().split(' ')[0]; var opt=[].slice.call($('ne_mgr').options).filter(function(o){return o.text&&mn&&o.text.toLowerCase().indexOf(mn)>-1;})[0]; if(opt)$('ne_mgr').value=opt.value; } toast('Read the offer — name'+(d.doj?', joining date':'')+(d.manager?' & manager':'')+' filled. Now enter the designation, department & level yourself.'); }
function showCredsModal(name,code,pass,offerAttached){
  var link='https://hrms-sable-five.vercel.app/';
  var first=(name||'').split(' ')[0]||'them';
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(20,15,25,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px';
  ov.innerHTML='<div style="background:#fff;border-radius:16px;max-width:440px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.32);overflow:hidden">'
   +'<div style="background:linear-gradient(120deg,#8A003E,#FF007F);color:#fff;padding:18px 22px"><div style="font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;opacity:.92">Login created</div><div style="font-size:19px;font-weight:800;margin-top:3px">'+esc(name)+'</div></div>'
   +'<div style="padding:20px 22px">'
   +'<div style="padding:11px 14px;background:#faf6f8;border:1px solid #ecdee6;border-radius:10px;margin-bottom:10px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#9a94a3">Employee number</div><div style="font-size:18px;font-weight:800;color:#1a1c22;margin-top:2px">'+esc(code)+'</div></div>'
   +'<div style="padding:11px 14px;background:#faf6f8;border:1px solid #ecdee6;border-radius:10px;margin-bottom:12px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#9a94a3">One-time password</div><div style="font-size:18px;font-weight:800;color:#8A003E;margin-top:2px;font-family:ui-monospace,Menlo,Consolas,monospace">'+esc(pass)+'</div></div>'
   +'<div style="font-size:11.5px;color:#7c7c87;margin-bottom:4px">Portal: <a href="'+link+'" target="_blank" style="color:#8A003E;font-weight:600;text-decoration:none">'+link+'</a></div>'
   +'<p style="font-size:12.5px;color:#54545f;line-height:1.55;margin:12px 0 0">Share these with '+esc(first)+'. They sign in with their <b>number + this password</b>, then set their own password on first login.'+(offerAttached?' The offer letter is attached — you can now upload the rest of their onboarding documents.':'')+'</p>'
   +'<div style="display:flex;gap:8px;margin-top:18px"><button id="_credCopy" class="btn btn-ghost btn-sm">Copy details</button><button id="_credDone" class="btn btn-primary btn-sm" style="margin-left:auto">Done</button></div>'
   +'</div></div>';
  document.body.appendChild(ov);
  var copyTxt='IncrediPets portal login\nName: '+name+'\nEmployee number: '+code+'\nOne-time password: '+pass+'\nPortal: '+link+'\n\nSign in with your number + this password, then set your own password.';
  ov.querySelector('#_credCopy').onclick=function(){ try{ navigator.clipboard.writeText(copyTxt); toast('Details copied'); }catch(e){ toast('Copy not available — please note them down'); } };
  ov.querySelector('#_credDone').onclick=function(){ ov.remove(); };
  ov.onclick=function(e){ if(e.target===ov) ov.remove(); };
}
async function createEmployee(){
  const g=id=>($(id)&&$(id).value||'').trim();
  const name=g('ne_name'),code=g('ne_code');
  if(!name||!code){toast('Name and employee code are required');return;}
  if(!g('ne_desig')||!g('ne_dept')||!g('ne_level')){toast('Please fill Designation, Department and Level before creating');return;}
  if(DB.employees.some(e=>(e.code||'').toLowerCase()===code.toLowerCase()||(e.id||'').toLowerCase()===code.toLowerCase())){toast('That employee code already exists');return;}
  const id=code; // keep id == employee code (IN-###), consistent with the rest of the org
  const email=(g('ne_email')||(code.toLowerCase().replace(/[^a-z0-9]/g,'')+'@incredipets.in')).toLowerCase();
  const status=g('ne_status')||'active';
  const emp={id:id,code:code,name:name,desig:g('ne_desig'),dept:g('ne_dept'),level:g('ne_level'),location:g('ne_loc'),doj:g('ne_doj'),managerId:g('ne_mgr')||null,phone:g('ne_phone'),email:email,personalEmail:g('ne_pmail')||null,status:status,onboarded:status!=='onboarding',mustChange:true,createdManually:true};
  DB.employees.push(emp);
  const pass=genPassword();
  if(!DB.users.find(u=>u.email===email))DB.users.push({email:email,pass:pass,role:'employee',employeeId:id});
  emp.tempPassword=pass;emp.passwordSet=false;emp.loginCode=code;
  DB.docTypes.forEach((t,i)=>DB.documents.push({id:'D'+id+'_'+i,employeeId:id,type:t,status:'requested',fileName:null,uploadedAt:null}));
  const offerFile=($('ne_offer')&&$('ne_offer').files&&$('ne_offer').files[0])||null;
  let liveOk=true, offerMsg='';
  if(LIVE&&sb){
    const empPayload={id:id,code:code,name:name,desig:emp.desig,dept:emp.dept,level:emp.level,location:emp.location,doj:emp.doj||null,manager_id:emp.managerId||null,manager_name:(emp.managerId?((empById(emp.managerId)||{}).name||null):null),phone:emp.phone||null,email:email,personal_email:emp.personalEmail||null,status:status,onboarded:emp.onboarded};
    try{ const cr=await sb.rpc('hrms_admin_create_employee',{p_code:_saveCreds.code,p_pass:_saveCreds.pass,p_emp:empPayload,p_temp:pass}); if(cr.error||!(cr.data&&cr.data.ok)){ liveOk=false; if(cr.data&&cr.data.err==='exists'){ DB.employees=DB.employees.filter(x=>x.id!==id); toast('That employee code already exists in the system'); return; } } }catch(e){ liveOk=false; }
    if(liveOk&&offerFile){
      if(offerFile.size>2600000){ offerMsg='\n\n(The offer file was too large to upload — please add it from their profile.)'; }
      else { try{ const resp=await liveDocUpload(id,'Signed offer letter',offerFile); const r=resp&&resp.data; if(r&&r.ok){ DB.documents.push({id:'D'+id+'_offer',employeeId:id,type:'Signed offer letter',status:'uploaded',fileName:offerFile.name,fileId:r.id}); offerMsg='\n\nOffer letter attached to their documents.'; } else { offerMsg='\n\n(Offer upload failed — add it from their profile.)'; } }catch(e){ offerMsg='\n\n(Offer upload failed — add it from their profile.)'; } }
    }
  } else if(offerFile){ DB.documents.push({id:'D'+id+'_offer',employeeId:id,type:'Signed offer letter',status:'uploaded',fileName:offerFile.name}); offerMsg='\n\nOffer letter attached to their documents.'; }
  audit('Created employee '+name+' ('+code+')');save();
  if(!liveOk){ toast('Created — but the live login could not be set; check connection and retry'); } else { toast('Employee created'); }
  showCredsModal(name,code,pass,offerMsg.indexOf('attached')>-1);
  openEmp(id);
}
function hrUploadDoc(did,id){const d=DB.documents.find(x=>x.id===did);if(!d)return;const inp=document.createElement('input');inp.type='file';inp.onchange=async ()=>{const file=inp.files[0];if(!file)return; if(LIVE&&sb){ if(file.size>2600000){toast('File too large (max ~2.5 MB)');return;} const resp=await liveDocUpload(id,d.type,file); const r=resp.data; if(resp.error||!r||!r.ok){toast('Upload failed');return;} d.status='uploaded';d.fileName=file.name;d.fileId=r.id;audit('HR uploaded '+d.type+' for '+((empById(id)||{}).name||''));toast('Uploaded '+d.type);renderEmp360(id);return; } d.status='uploaded';d.fileName=file.name||'document.pdf';d.uploadedAt=new Date().toISOString().slice(0,10);save();audit('HR uploaded '+d.type+' for '+((empById(id)||{}).name||''));toast('Uploaded '+d.type);renderEmp360(id);};inp.click();}
function hrAddDoc(id){const t=prompt('Document name (e.g. Signed offer letter, Address proof, Police verification)');if(!t)return;DB.documents.push({id:'D'+id+'_x'+Date.now(),employeeId:id,type:t.trim(),status:'requested',fileName:null,uploadedAt:null});save();audit('Added document slot "'+t.trim()+'" for '+((empById(id)||{}).name||''));toast('Document added — now upload it');renderEmp360(id);}

/* ---------- boot ---------- */
bootApp();
</script>
